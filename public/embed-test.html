<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP Viewer 組み込みテスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .badge {
      font-size: 11px;
      background: #1d4ed8;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .toolbar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 13px;
      color: #94a3b8;
    }

    .btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }

    .file-status {
      font-size: 12px;
      color: #64748b;
    }
    .file-status.loaded { color: #4ade80; }

    .viewer-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #0f172a;
      color: #475569;
      font-size: 14px;
    }
    .overlay.hidden { display: none; }

    .log {
      background: #0f172a;
      border-top: 1px solid #334155;
      padding: 6px 24px;
      font-size: 11px;
      color: #64748b;
      font-family: monospace;
      flex-shrink: 0;
      min-height: 28px;
    }
    .log.ok { color: #4ade80; }
    .log.err { color: #f87171; }
  </style>
</head>
<body>

  <header>
    <h1>BOMS Lite — STEP Viewer 組み込みテスト</h1>
    <span class="badge">iframe + postMessage</span>
  </header>

  <div class="toolbar">
    <label>ローカルファイルで動作確認:</label>
    <input id="fileInput" type="file" accept=".step,.stp" style="display:none" />
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
      STEP ファイルを選択
    </button>
    <span id="fileStatus" class="file-status">未選択</span>
  </div>

  <div class="viewer-container">
    <div id="overlay" class="overlay">
      <svg width="48" height="48" fill="none" stroke="#475569" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25"/>
      </svg>
      <p>STEP ファイルを選択するとここに 3D モデルが表示されます</p>
    </div>
    <iframe
      id="viewerFrame"
      src="https://cad-viewer-experiment.vercel.app"
      allow="cross-origin-isolated"
    ></iframe>
  </div>

  <div id="log" class="log">待機中...</div>

  <script>
    const fileInput  = document.getElementById('fileInput')
    const fileStatus = document.getElementById('fileStatus')
    const frame      = document.getElementById('viewerFrame')
    const overlay    = document.getElementById('overlay')
    const log        = document.getElementById('log')

    let iframeReady = false

    // iframe のロード完了を検知
    frame.addEventListener('load', () => {
      iframeReady = true
      setLog('ビューア読み込み完了。ファイルを選択してください。', '')
    })

    // ファイル選択
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0]
      if (!file) return

      fileStatus.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`
      fileStatus.className = 'file-status loaded'
      setLog(`"${file.name}" を読み込み中...`, '')

      try {
        const buffer = await file.arrayBuffer()

        if (!iframeReady) {
          setLog('ビューアの準備中です。少し待ってから再選択してください。', 'err')
          return
        }

        // postMessage で送信（BOMS Lite から Drive ファイルを送る場合も同じ形式）
        frame.contentWindow.postMessage(
          { type: 'loadStep', buffer, name: file.name },
          'https://cad-viewer-experiment.vercel.app'
        )

        overlay.classList.add('hidden')
        setLog(`送信完了: "${file.name}" → iframe`, 'ok')
      } catch (err) {
        setLog(`エラー: ${err.message}`, 'err')
      }
    })

    function setLog(msg, type) {
      log.textContent = msg
      log.className = 'log' + (type ? ` ${type}` : '')
    }
  </script>

</body>
</html>
