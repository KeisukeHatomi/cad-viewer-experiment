<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pivot Icon — Design Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #080e1a;
    --surface:    #0f172a;
    --surface-2:  #1a2540;
    --border:     #1e2d47;
    --text-1:     #f1f5f9;
    --text-2:     #64748b;
    --text-3:     #334155;

    --cyan:       #00e8ff;
    --cyan-glow:  rgba(0, 232, 255, 0.18);
    --cyan-dim:   rgba(0, 232, 255, 0.06);

    --gold:       #fbbf24;
    --gold-glow:  rgba(251, 191, 36, 0.18);
    --gold-dim:   rgba(251, 191, 36, 0.06);

    --slate:      #cbd5e1;
    --slate-glow: rgba(203, 213, 225, 0.14);
    --slate-dim:  rgba(203, 213, 225, 0.05);

    --radius:     12px;
    --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(0, 232, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 232, 255, 0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    font-family: 'Inter', sans-serif;
    color: var(--text-1);
    gap: 48px;
  }

  /* ── Header ── */
  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
  }

  .header-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-transform: uppercase;
    opacity: 0.8;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-1);
  }

  header p {
    font-size: 13px;
    color: var(--text-2);
    font-weight: 400;
    max-width: 360px;
    line-height: 1.6;
  }

  /* ── Card Grid ── */
  .grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Individual Card ── */
  .card {
    position: relative;
    width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    cursor: pointer;
    transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition), background var(--transition);
    outline: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity var(--transition);
    pointer-events: none;
  }

  /* Top accent bar */
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1.5px;
    border-radius: 0 0 2px 2px;
    transition: opacity var(--transition);
  }

  /* Cyan card */
  .card-a::after  { background: var(--cyan); }
  .card-a::before { background: radial-gradient(ellipse at 50% 0%, var(--cyan-dim) 0%, transparent 70%); }

  /* Gold card */
  .card-b::after  { background: var(--gold); }
  .card-b::before { background: radial-gradient(ellipse at 50% 0%, var(--gold-dim) 0%, transparent 70%); }

  /* Slate card */
  .card-c::after  { background: var(--slate); }
  .card-c::before { background: radial-gradient(ellipse at 50% 0%, var(--slate-dim) 0%, transparent 70%); }

  /* Hover states */
  .card-a:hover, .card-a:focus-visible {
    border-color: rgba(0, 232, 255, 0.4);
    box-shadow: 0 0 0 1px rgba(0, 232, 255, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 24px var(--cyan-glow);
    transform: translateY(-2px);
    background: var(--surface-2);
  }
  .card-b:hover, .card-b:focus-visible {
    border-color: rgba(251, 191, 36, 0.4);
    box-shadow: 0 0 0 1px rgba(251, 191, 36, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 24px var(--gold-glow);
    transform: translateY(-2px);
    background: var(--surface-2);
  }
  .card-c:hover, .card-c:focus-visible {
    border-color: rgba(203, 213, 225, 0.35);
    box-shadow: 0 0 0 1px rgba(203, 213, 225, 0.12), 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 24px var(--slate-glow);
    transform: translateY(-2px);
    background: var(--surface-2);
  }

  .card:hover::before, .card:focus-visible::before { opacity: 1; }
  .card:hover::after,  .card:focus-visible::after  { opacity: 1; }

  /* Selected state */
  .card.selected.card-a {
    border-color: rgba(0, 232, 255, 0.55);
    box-shadow: 0 0 0 1px rgba(0, 232, 255, 0.25), 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 36px var(--cyan-glow);
    background: var(--surface-2);
  }
  .card.selected.card-b {
    border-color: rgba(251, 191, 36, 0.55);
    box-shadow: 0 0 0 1px rgba(251, 191, 36, 0.25), 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 36px var(--gold-glow);
    background: var(--surface-2);
  }
  .card.selected.card-c {
    border-color: rgba(203, 213, 225, 0.45);
    box-shadow: 0 0 0 1px rgba(203, 213, 225, 0.18), 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 36px var(--slate-glow);
    background: var(--surface-2);
  }
  .card.selected::before { opacity: 1; }
  .card.selected::after  { opacity: 1; }

  /* ── Corner brackets ── */
  .brackets {
    position: absolute;
    inset: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity var(--transition);
  }
  .card:hover .brackets,
  .card:focus-visible .brackets,
  .card.selected .brackets { opacity: 1; }

  .brackets svg { width: 100%; height: 100%; }

  /* ── Icon container ── */
  .icon-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform var(--transition);
  }
  .card:hover .icon-wrap,
  .card:focus-visible .icon-wrap,
  .card.selected .icon-wrap { transform: scale(1.06); }

  /* Icon glow filter */
  .card-a .icon-wrap svg { filter: drop-shadow(0 0 6px rgba(0, 232, 255, 0)); transition: filter var(--transition); }
  .card-a:hover .icon-wrap svg,
  .card-a:focus-visible .icon-wrap svg,
  .card-a.selected .icon-wrap svg { filter: drop-shadow(0 0 7px rgba(0, 232, 255, 0.55)); }

  .card-b .icon-wrap svg { filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0)); transition: filter var(--transition); }
  .card-b:hover .icon-wrap svg,
  .card-b:focus-visible .icon-wrap svg,
  .card-b.selected .icon-wrap svg { filter: drop-shadow(0 0 7px rgba(251, 191, 36, 0.55)); }

  .card-c .icon-wrap svg { filter: drop-shadow(0 0 6px rgba(203, 213, 225, 0)); transition: filter var(--transition); }
  .card-c:hover .icon-wrap svg,
  .card-c:focus-visible .icon-wrap svg,
  .card-c.selected .icon-wrap svg { filter: drop-shadow(0 0 7px rgba(203, 213, 225, 0.45)); }

  /* ── Card meta ── */
  .card-meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    width: 100%;
  }

  .card-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .card-a .card-id { color: var(--cyan); }
  .card-b .card-id { color: var(--gold); }
  .card-c .card-id { color: var(--slate); }

  .card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-1);
    letter-spacing: -0.01em;
  }

  .card-desc {
    font-size: 11px;
    color: var(--text-2);
    text-align: center;
    line-height: 1.55;
    margin-top: 2px;
  }

  /* ── Selected badge ── */
  .badge {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 2px 10px;
    border-radius: 99px;
    opacity: 0;
    transition: opacity var(--transition);
    pointer-events: none;
    white-space: nowrap;
  }
  .card-a .badge { background: rgba(0, 232, 255, 0.12); color: var(--cyan); border: 1px solid rgba(0, 232, 255, 0.35); }
  .card-b .badge { background: rgba(251, 191, 36, 0.12); color: var(--gold); border: 1px solid rgba(251, 191, 36, 0.35); }
  .card-c .badge { background: rgba(203, 213, 225, 0.08); color: var(--slate); border: 1px solid rgba(203, 213, 225, 0.3); }
  .card.selected .badge { opacity: 1; }

  /* ── Footer ── */
  footer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.12em;
    text-align: center;
    text-transform: uppercase;
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 0ms !important; }
  }
</style>
</head>
<body>

<header>
  <span class="header-eyebrow">CAD Viewer — Icon Concept</span>
  <h1>ピボット アイコン</h1>
  <p>3D回転基点を示すピボットアイコンの案比較。クリックして選択。</p>
</header>

<!-- Card Grid -->
<div class="grid" role="radiogroup" aria-label="ピボットアイコン案">

  <!-- 案A: レティクル -->
  <div class="card card-a" role="radio" aria-checked="false" tabindex="0" aria-label="案A レティクル">
    <span class="badge">SELECTED</span>

    <!-- Corner brackets -->
    <div class="brackets" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 0 14 L 0 0 L 14 0"   stroke="#00e8ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <path d="M 86 0 L 100 0 L 100 14" stroke="#00e8ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <path d="M 0 86 L 0 100 L 14 100" stroke="#00e8ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <path d="M 100 86 L 100 100 L 86 100" stroke="#00e8ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      </svg>
    </div>

    <div class="icon-wrap" aria-hidden="true">
      <svg width="100" height="100" viewBox="-50 -50 100 100" overflow="visible">
        <!-- Outer ring -->
        <circle cx="0" cy="0" r="24" fill="none" stroke="#00e8ff" stroke-width="1.2" opacity="0.85"/>
        <!-- Inner ring subtle -->
        <circle cx="0" cy="0" r="10" fill="none" stroke="#00e8ff" stroke-width="0.6" opacity="0.35"/>
        <!-- Cross lines with gap -->
        <line x1="0" y1="-14" x2="0" y2="-32" stroke="#00e8ff" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
        <line x1="0" y1="14"  x2="0" y2="32"  stroke="#00e8ff" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
        <line x1="-14" y1="0" x2="-32" y2="0" stroke="#00e8ff" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
        <line x1="14"  y1="0" x2="32"  y2="0" stroke="#00e8ff" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
        <!-- Tick marks on ring -->
        <line x1="0" y1="-23" x2="0" y2="-27" stroke="#00e8ff" stroke-width="1" opacity="0.5"/>
        <line x1="0" y1="23"  x2="0" y2="27"  stroke="#00e8ff" stroke-width="1" opacity="0.5"/>
        <line x1="-23" y1="0" x2="-27" y2="0" stroke="#00e8ff" stroke-width="1" opacity="0.5"/>
        <line x1="23"  y1="0" x2="27"  y2="0" stroke="#00e8ff" stroke-width="1" opacity="0.5"/>
        <!-- Center dot -->
        <circle cx="0" cy="0" r="2.5" fill="#00e8ff" opacity="0.95"/>
      </svg>
    </div>

    <div class="card-meta">
      <span class="card-id">案 A</span>
      <span class="card-name">レティクル</span>
      <span class="card-desc">照準スタイル。外円＋十字で<br>精密さを直感的に表現。</span>
    </div>
  </div>

  <!-- 案B: ダイヤ＋クロス -->
  <div class="card card-b" role="radio" aria-checked="false" tabindex="0" aria-label="案B ダイヤ＋クロス">
    <span class="badge">SELECTED</span>

    <div class="brackets" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 0 14 L 0 0 L 14 0"   stroke="#fbbf24" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <path d="M 86 0 L 100 0 L 100 14" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <path d="M 0 86 L 0 100 L 14 100" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <path d="M 100 86 L 100 100 L 86 100" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      </svg>
    </div>

    <div class="icon-wrap" aria-hidden="true">
      <svg width="100" height="100" viewBox="-50 -50 100 100" overflow="visible">
        <!-- Diamond -->
        <polygon points="0,-22 22,0 0,22 -22,0" fill="none" stroke="#fbbf24" stroke-width="1.3" opacity="0.9"/>
        <!-- Inner diamond subtle -->
        <polygon points="0,-10 10,0 0,10 -10,0" fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.3"/>
        <!-- Outer ticks (axis-aligned) -->
        <line x1="0" y1="-27" x2="0" y2="-36" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
        <line x1="0" y1="27"  x2="0" y2="36"  stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
        <line x1="-27" y1="0" x2="-36" y2="0" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
        <line x1="27"  y1="0" x2="36"  y2="0" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
        <!-- 45° diagonal ticks -->
        <line x1="-17" y1="-17" x2="-23" y2="-23" stroke="#fbbf24" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
        <line x1="17"  y1="-17" x2="23"  y2="-23" stroke="#fbbf24" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
        <line x1="-17" y1="17"  x2="-23" y2="23"  stroke="#fbbf24" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
        <line x1="17"  y1="17"  x2="23"  y2="23"  stroke="#fbbf24" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
        <!-- Center dot -->
        <circle cx="0" cy="0" r="2.5" fill="#fbbf24" opacity="0.95"/>
      </svg>
    </div>

    <div class="card-meta">
      <span class="card-id">案 B</span>
      <span class="card-name">ダイヤ＋クロス</span>
      <span class="card-desc">菱形の幾何学的フォルムで<br>CADらしい技術感を演出。</span>
    </div>
  </div>

  <!-- 案C: ミニマル -->
  <div class="card card-c" role="radio" aria-checked="false" tabindex="0" aria-label="案C ミニマル">
    <span class="badge">SELECTED</span>

    <div class="brackets" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 0 14 L 0 0 L 14 0"   stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
        <path d="M 86 0 L 100 0 L 100 14" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
        <path d="M 0 86 L 0 100 L 14 100" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
        <path d="M 100 86 L 100 100 L 86 100" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
      </svg>
    </div>

    <div class="icon-wrap" aria-hidden="true">
      <svg width="100" height="100" viewBox="-50 -50 100 100" overflow="visible">
        <!-- Dashed outer ring -->
        <circle cx="0" cy="0" r="23" fill="none" stroke="#cbd5e1" stroke-width="0.9" stroke-dasharray="3.5 4.5" opacity="0.5"/>
        <!-- 4-corner L brackets -->
        <path d="M -33,-18 L -33,-33 L -18,-33" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M  33,-18 L  33,-33 L  18,-33" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M -33, 18 L -33, 33 L -18, 33" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M  33, 18 L  33, 33 L  18, 33" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Center mini cross -->
        <line x1="-7" y1="0" x2="7"  y2="0" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
        <line x1="0" y1="-7" x2="0"  y2="7" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
        <!-- Center dot -->
        <circle cx="0" cy="0" r="2" fill="#cbd5e1" opacity="0.95"/>
      </svg>
    </div>

    <div class="card-meta">
      <span class="card-id">案 C</span>
      <span class="card-name">ミニマル</span>
      <span class="card-desc">L字コーナーで空間を囲む<br>シンプルで汎用的な構成。</span>
    </div>
  </div>

</div>

<footer>PIVOT ICON EXPLORATION &nbsp;·&nbsp; CAD VIEWER EXPERIMENT</footer>

<script>
  const cards = document.querySelectorAll('.card');

  function selectCard(target) {
    cards.forEach(c => {
      c.classList.remove('selected');
      c.setAttribute('aria-checked', 'false');
    });
    target.classList.add('selected');
    target.setAttribute('aria-checked', 'true');
  }

  cards.forEach(card => {
    card.addEventListener('click', () => selectCard(card));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectCard(card);
      }
    });
  });
</script>
</body>
</html>
