<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- 背景：ブループリント風 -->
  <rect x="2" y="2" width="44" height="44" rx="4" fill="#1E3A5F"/>
  <!-- グリッド線（図面用紙の雰囲気） -->
  <line x1="2" y1="14" x2="46" y2="14" stroke="#2A4F7A" stroke-width="0.5"/>
  <line x1="2" y1="26" x2="46" y2="26" stroke="#2A4F7A" stroke-width="0.5"/>
  <line x1="2" y1="38" x2="46" y2="38" stroke="#2A4F7A" stroke-width="0.5"/>
  <line x1="14" y1="2" x2="14" y2="46" stroke="#2A4F7A" stroke-width="0.5"/>
  <line x1="26" y1="2" x2="26" y2="46" stroke="#2A4F7A" stroke-width="0.5"/>
  <line x1="38" y1="2" x2="38" y2="46" stroke="#2A4F7A" stroke-width="0.5"/>
  <!-- L字ブラケット断面（部品形状） -->
  <path d="M10 38 L10 12 L20 12 L20 28 L34 28 L34 38 Z" fill="none" stroke="#64B5F6" stroke-width="2" stroke-linejoin="miter"/>
  <!-- 水平寸法線（上部） -->
  <line x1="10" y1="8" x2="20" y2="8" stroke="#FF7043" stroke-width="1.2"/>
  <line x1="10" y1="10" x2="10" y2="6" stroke="#FF7043" stroke-width="0.8"/>
  <line x1="20" y1="10" x2="20" y2="6" stroke="#FF7043" stroke-width="0.8"/>
  <polygon points="10,8 13,6.8 13,9.2" fill="#FF7043"/>
  <polygon points="20,8 17,6.8 17,9.2" fill="#FF7043"/>
  <!-- 垂直寸法線（右側） -->
  <line x1="39" y1="28" x2="39" y2="38" stroke="#FF7043" stroke-width="1.2"/>
  <line x1="37" y1="28" x2="41" y2="28" stroke="#FF7043" stroke-width="0.8"/>
  <line x1="37" y1="38" x2="41" y2="38" stroke="#FF7043" stroke-width="0.8"/>
  <polygon points="39,28 37.5,31 40.5,31" fill="#FF7043"/>
  <polygon points="39,38 37.5,35 40.5,35" fill="#FF7043"/>
  <!-- マークポイント（BlueMark） -->
  <circle cx="34" cy="16" r="4" fill="none" stroke="#FF7043" stroke-width="1.5"/>
  <circle cx="34" cy="16" r="1.2" fill="#FF7043"/>
</svg>
